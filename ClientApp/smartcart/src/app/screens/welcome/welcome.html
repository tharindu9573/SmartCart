<div class="tablet">
  <div class="splash">
    <div class="splash-logo">
      <svg xmlns="http://www.w3.org/2000/svg" width="42" height="42" viewBox="0 0 24 24"
           fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="21" r="1"/>
        <circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 001.95-1.57l1.65-8.42H6"/>
      </svg>
    </div>
    <div class="splash-title">SmartCart</div>
    <div class="splash-sub">Scan &amp; Go shopping.<br>No queues. No hassle.</div>
    <button class="splash-btn" (click)="start()">TAP TO START</button>
    <div class="splash-footer">
      <span class="status-dot"></span>
      {{ cartLabel }} &nbsp;&middot;&nbsp; Ready
    </div>
  </div>
</div>
