<div class="tablet">
  <div class="failed-center">
    <div class="failed-icon">&#10060;</div>
    <div class="failed-title">Payment Failed</div>
    <div class="failed-sub">Your card could not be charged. Please try again or choose a different payment method.</div>
    <button class="btn btn-danger" style="margin-top:8px;" (click)="retry()">TRY AGAIN</button>
    <button class="btn btn-ghost" (click)="chooseOther()">CHOOSE DIFFERENT METHOD</button>
  </div>
</div>
